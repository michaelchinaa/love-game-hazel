<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card Game - Lobby</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Georgia, serif;
        background: #1a1a2e;
        color: #e0d5c1;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .container {
        background: rgba(255, 255, 255, 0.05);
        padding: 40px;
        border-radius: 20px;
        border: 1px solid rgba(212, 175, 55, 0.3);
        text-align: center;
        max-width: 500px;
        width: 90%;
      }

      h1 {
        color: #d4af37;
        margin-bottom: 20px;
      }

      .btn {
        display: block;
        width: 100%;
        padding: 15px;
        margin: 10px 0;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        cursor: pointer;
        font-family: inherit;
        font-weight: bold;
        transition: all 0.3s;
      }

      .btn-primary {
        background: #d4af37;
        color: #1a1a2e;
      }

      .btn-primary:hover {
        box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
      }

      .btn-secondary {
        background: transparent;
        border: 2px solid #d4af37;
        color: #d4af37;
      }

      .btn-secondary:hover {
        background: rgba(212, 175, 55, 0.1);
      }

      .input {
        width: 100%;
        padding: 15px;
        margin: 10px 0;
        border-radius: 10px;
        border: 1px solid rgba(212, 175, 55, 0.4);
        background: rgba(0, 0, 0, 0.3);
        color: #e0d5c1;
        font-size: 16px;
        font-family: inherit;
      }

      .input:focus {
        outline: none;
        border-color: #d4af37;
        box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
      }

      .divider {
        color: #a09070;
        margin: 15px 0;
      }

      .room-code {
        font-size: 48px;
        color: #d4af37;
        letter-spacing: 8px;
        font-family: monospace;
        margin: 20px 0;
      }

      .hidden {
        display: none;
      }

      .status-text {
        color: #a09070;
        margin-top: 15px;
        font-style: italic;
      }

      .error-text {
        color: #ff6666;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🃏 Card Game</h1>
      <a href="/results.html" class="btn btn-secondary">📊 View Results</a>
      <div id="mainMenu">
        <button class="btn btn-primary" onclick="createGame()">
          Create New Game
        </button>
        <div class="divider">or</div>
        <input
          type="text"
          id="roomCodeInput"
          class="input"
          placeholder="Enter Room Code"
          maxlength="6"
        />
        <input
          type="text"
          id="playerNameInput"
          class="input"
          placeholder="Your Name"
          maxlength="20"
        />
        <button class="btn btn-secondary" onclick="joinGame()">
          Join Game
        </button>
        <div id="statusMessage" class="status-text"></div>
      </div>

      <div id="waitingRoom" class="hidden">
        <p>Your Room Code:</p>
        <div class="room-code" id="roomCodeDisplay"></div>
        <p>Waiting for partner to join...</p>
        <div id="waitingStatus" class="status-text">
          Checking for partner...
        </div>
      </div>
    </div>

    <script>
      const API = "/api";
      const playerId = "player_" + Math.random().toString(36).substring(2, 9);

      async function createGame() {
        const name =
          document.getElementById("playerNameInput").value.trim() || "Player 1";
        const status = document.getElementById("statusMessage");
        status.textContent = "⏳ Creating game...";

        // Generate a random 6-character room code
        const roomCode = Math.random()
          .toString(36)
          .substring(2, 8)
          .toUpperCase();

        try {
          const res = await fetch(API + "/create-game", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              roomCode: roomCode,
              playerId: playerId,
              playerName: name,
            }),
          });

          const data = await res.json();
          console.log("Create game response:", data);

          if (data.success || data.created || data.exists) {
            status.textContent = "✅ Game created!";

            // Show waiting room
            document.getElementById("mainMenu").classList.add("hidden");
            document.getElementById("waitingRoom").classList.remove("hidden");
            document.getElementById("roomCodeDisplay").textContent = roomCode;

            // Store for game page
            localStorage.setItem("roomCode", roomCode);
            localStorage.setItem("playerId", playerId);
            localStorage.setItem("playerName", name);

            // Poll for partner to join
            checkForPartner(roomCode);
          } else {
            status.textContent =
              "❌ Error: " + (data.error || data.message || "Unknown error");
            status.className = "error-text";
          }
        } catch (error) {
          console.error("Error creating game:", error);
          status.textContent = "❌ Error: " + error.message;
          status.className = "error-text";
        }
      }

      async function joinGame() {
        const roomCode = document
          .getElementById("roomCodeInput")
          .value.trim()
          .toUpperCase();
        const name =
          document.getElementById("playerNameInput").value.trim() || "Player 2";

        const status = document.getElementById("statusMessage");

        if (!roomCode) {
          status.textContent = "❌ Please enter a room code";
          status.className = "error-text";
          return;
        }

        status.textContent = "⏳ Joining game...";

        try {
          const res = await fetch(API + "/join-room", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ roomCode, playerId, playerName: name }),
          });

          const data = await res.json();
          console.log("Join game response:", data);

          if (data.success) {
            status.textContent = "✅ Joined! Starting game...";

            localStorage.setItem("roomCode", roomCode);
            localStorage.setItem("playerId", playerId);
            localStorage.setItem("playerName", name);

            // Redirect to game page
            setTimeout(() => {
              window.location.href = "/game.html";
            }, 500);
          } else {
            status.textContent = "❌ " + (data.error || "Failed to join game");
            status.className = "error-text";
          }
        } catch (error) {
          console.error("Error joining game:", error);
          status.textContent = "❌ Error: " + error.message;
          status.className = "error-text";
        }
      }

      function checkForPartner(roomCode) {
        const status = document.getElementById("waitingStatus");
        let attempts = 0;

        const interval = setInterval(async () => {
          attempts++;
          status.textContent = `Checking for partner... (${attempts})`;

          try {
            const res = await fetch(
              API + "/game-state?room=" + roomCode + "&playerId=" + playerId,
            );
            const data = await res.json();
            console.log("Game state check:", data);

            if (data.phase === "playing" || data.phase === "rules") {
              status.textContent = "✅ Partner found! Starting game...";
              clearInterval(interval);
              setTimeout(() => {
                window.location.href = "/game.html";
              }, 500);
            } else if (data.partnerConnected) {
              status.textContent = "✅ Partner connected! Starting game...";
              clearInterval(interval);
              setTimeout(() => {
                window.location.href = "/game.html";
              }, 500);
            }
          } catch (error) {
            console.error("Error checking for partner:", error);
          }
        }, 2000);

        // Timeout after 60 seconds
        setTimeout(() => {
          clearInterval(interval);
          if (status.textContent !== "✅ Partner found! Starting game...") {
            status.textContent =
              "⏰ Still waiting for partner... You can share the room code with them.";
          }
        }, 60000);
      }

      // Auto-submit on Enter key
      document.addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
          const roomInput = document.getElementById("roomCodeInput");
          if (document.activeElement === roomInput) {
            joinGame();
          }
        }
      });
    </script>
  </body>
</html>
